      title: LI-001 Backend capability detection fails closed to authored hints
      summary: Detection of local inference support (Prompt API, WebGPU, WASM) 
        SHALL be lazy and side-effect-free, and every unsupported, failed, or 
        partially available outcome SHALL resolve the guidance path to authored 
        hints without error dialogs or blocked interaction.
      sources:
