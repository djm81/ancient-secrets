      title: TM-002 Every identified threat maps to a mitigation or an explicit 
        accepted risk
      summary: Each enumerated threat SHALL reference the requirement ID that 
        mitigates it or carry an explicit accepted-risk entry with rationale; no
        threat may be listed unresolved.
