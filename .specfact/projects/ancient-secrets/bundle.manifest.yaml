      title: LI-002 Model assets download only after explicit informed opt-in 
        and are evictable
      summary: No model or engine asset SHALL download until the player confirms
        a disclosure stating the approximate size and that all processing stays 
        on the device. Assets SHALL never ship in the repository or site 
        payload, SHALL be stored only in browser-managed caches, and SHALL be 
        removable via an eviction control that also reverts the backend 
        preference.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/on-device-guidance/specs/local-inference-runtime/spec.md
        title: local-inference-runtime
        revision: 
          sha256:41691356b25e9675e07587b3748f99adb43cb607e1663700e1abbcadb2837da6
      business_rules:
      - rule_id: 
          openspec:on-device-guidance:local-inference-runtime:li-002-model-assets-download-only-after-explicit-informed-opt-in-and-are-evictable:no-download-without-consent
        name: No download without consent
        given: a fresh chronicle with default settings
        when: the player plays without opening the backend setting
        then: no model or engine asset is requested from any origin
        priority:
      - rule_id: 
          openspec:on-device-guidance:local-inference-runtime:li-002-model-assets-download-only-after-explicit-informed-opt-in-and-are-evictable:eviction-removes-assets-and-reverts-preference
        name: Eviction removes assets and reverts preference
        given: a player who previously opted in and downloaded a local model
        when: they activate the eviction control
        then: cached model assets are cleared, the preference reverts to 
          authored-only, and guidance continues via authored hints
        priority:
