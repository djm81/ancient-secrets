          reflects the miss
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:maestro-debrief:md-002-debrief-questions-are-fixed-multiple-choice-with-authored-feedback-for-every-option:question-bank-is-stable
        name: Question bank is stable
        given: the same era is debriefed twice
        when: the questions are presented
        then: they come from that era's fixed authored bank of three, with only 
          option order varying by seed
        priority:
      constraints: []
