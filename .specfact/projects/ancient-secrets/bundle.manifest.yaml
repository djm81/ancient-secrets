    schema_version: '1'
    requirements:
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:era-expeditions:ee-001-eras-are-authored-data-driven-and-complete-offline
      title: EE-001 Eras are authored, data-driven, and complete offline
      summary: 'The game SHALL ship seven authored eras (Babylon, Egypt, Athens, Rome,
        Champagne Fairs, Florence 1494, The Age to Come) defined entirely in static
        content modules: scene graph, mentor dialogue, three clue artifacts, trial
        parameters, hints, and failure explanations. Every era SHALL be fully explorable
        and completable with no network access and no Worker deployed.'
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/era-expeditions/spec.md
        title: era-expeditions
        revision: 
          sha256:ab7a834bb9ba87e06a79f6faaf3be4e84a3ff77146a5fea42590cf841bcfce0f
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-001-eras-are-authored-data-driven-and-complete-offline:offline-era-completion
        name: Offline era completion
        given: the site is served statically with no guidance endpoint 
          configured
        when: the player explores an era, collects its clues, and passes its 
          trial
        then: the full loop including debrief and invention reveal completes 
          using authored content only
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:era-expeditions:ee-002-each-trial-is-deterministic-era-authentic-and-solvable-from-in-era-knowledge
      title: EE-002 Each trial is deterministic, era-authentic, and solvable 
        from in-era knowledge
      summary: Each era SHALL contain exactly one trial whose mechanics use that
        era's documented financial instruments (per the design mapping table), 
        whose parameters derive from authored tables plus a per-attempt seed, 
        and whose evaluation is a pure function reproducible in the Node test 
        runner. Everything needed to solve a trial SHALL be learnable from its 
        era's clues and mentor dialogue; no modern FinOps vocabulary SHALL be 
        required to pass. Solving SHALL be possible on every generated parameter
        set.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/era-expeditions/spec.md
        title: era-expeditions
        revision: 
          sha256:ab7a834bb9ba87e06a79f6faaf3be4e84a3ff77146a5fea42590cf841bcfce0f
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-002-each-trial-is-deterministic-era-authentic-and-solvable-from-in-era-knowledge:deterministic-trial-evaluation
        name: Deterministic trial evaluation
        given: a fixed seed for the Babylon ledger trial
        when: the trial is generated twice and the same answers are evaluated
        then: both runs produce identical parameters, identical verdicts, and 
          identical mastery deltas
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-002-each-trial-is-deterministic-era-authentic-and-solvable-from-in-era-knowledge:every-generated-trial-is-solvable
        name: Every generated trial is solvable
        given: any seed across the tested seed range for each of the seven 
          trials
        when: the trial is generated
        then: at least one answer set exists that the evaluator accepts as a 
          pass
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-002-each-trial-is-deterministic-era-authentic-and-solvable-from-in-era-knowledge:era-knowledge-suffices
        name: Era knowledge suffices
        given: the Rome trial's clues describe farmed contracts, direct 
          collection, and audit marks in era language
        when: a player applies only those clues
        then: the trial is passable without any reference to modern terminology
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:era-expeditions:ee-003-withdrawing-is-always-available-and-never-destroys-progress
      title: EE-003 Withdrawing is always available and never destroys progress
      summary: Every trial SHALL offer a clearly labeled withdraw action at any 
        point. Withdrawing SHALL preserve collected clues and era exploration 
        state, route the player to Leonardo's debrief with an authored 
        explanation matched to the specific failure category of the attempt, 
        mark the era as withdrawn, and allow unlimited retries with a fresh 
        seed. Withdrawal SHALL reduce, not zero, the mastery credit available 
        from that era until a later pass.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/era-expeditions/spec.md
        title: era-expeditions
        revision: 
          sha256:ab7a834bb9ba87e06a79f6faaf3be4e84a3ff77146a5fea42590cf841bcfce0f
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-003-withdrawing-is-always-available-and-never-destroys-progress:withdraw-and-retry
        name: Withdraw and retry
        given: a player mid-way through the Champagne routing trial
        when: they withdraw after choosing an overpriced route segment
        then: the debrief explains fee-versus-risk routing specifically, the era
          is marked withdrawn, clues remain collected, and a retry generates a 
          fresh seed
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-003-withdrawing-is-always-available-and-never-destroys-progress:failure-categories-select-explanations
        name: Failure categories select explanations
        given: two withdrawn Babylon attempts, one with an unbalanced ledger and
          one with an illegal interest rate
        when: each debrief runs
        then: each shows the explanation authored for its failure category, not 
          a generic message
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:era-expeditions:ee-004-era-hints-follow-the-bounded-guidance-contract
      title: EE-004 Era hints follow the bounded-guidance contract
      summary: Each era SHALL provide authored nudge, hint, and reveal tiers 
        scoped to its trial, served through the existing fixed-tier guidance 
        interface. When the optional Worker is configured, guidance requests MAY
        include the era as a validated enum; unknown or missing era values SHALL
        fall back to authored era hints without error. No player-entered text 
        SHALL be introduced.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/era-expeditions/spec.md
        title: era-expeditions
        revision: 
          sha256:ab7a834bb9ba87e06a79f6faaf3be4e84a3ff77146a5fea42590cf841bcfce0f
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-004-era-hints-follow-the-bounded-guidance-contract:authored-era-hints-without-a-worker
        name: Authored era hints without a Worker
        given: no guidance endpoint is configured
        when: the player requests a hint during the Egypt trial
        then: the authored Egypt hint for the current trial stage is shown at 
          the requested tier
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-004-era-hints-follow-the-bounded-guidance-contract:invalid-era-value-at-the-worker
        name: Invalid era value at the Worker
        given: a guidance request whose era field is not in the known era list
        when: the Worker validates the request
        then: the request is handled as era-less and the client's authored 
          fallback remains available
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:era-expeditions:ee-005-era-scenes-meet-the-established-experience-quality-standard
      title: EE-005 Era scenes meet the established experience-quality standard
      summary: Every era scene, clue interaction, trial control, and withdraw 
        action SHALL be keyboard-operable with visible focus, honor reduced 
        motion and high contrast, and announce trial feedback (accepted step, 
        rejected step, pass, withdraw) through the existing feedback channel.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/era-expeditions/spec.md
        title: era-expeditions
        revision: 
          sha256:ab7a834bb9ba87e06a79f6faaf3be4e84a3ff77146a5fea42590cf841bcfce0f
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-005-era-scenes-meet-the-established-experience-quality-standard:announced-trial-feedback
        name: Announced trial feedback
        given: a screen-reader user in the Florence trial
        when: they post a balancing entry that the evaluator rejects
        then: the rejection and its era-language reason are announced without 
          moving focus unexpectedly
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:era-expeditions:ee-006-each-era-presents-an-authored-realistic-visual-identity
      title: EE-006 Each era presents an authored, realistic visual identity
      summary: Each era SHALL ship three authored realistic images unique to its
        civilization — scene backdrop, mentor portrait, and trial tableau — 
        generated at authoring time from recorded art briefs, curated for 
        historical accuracy, and committed as optimized static assets. All era 
        interaction SHALL use the established dialogue-panel pattern with fixed 
        multiple-choice options rendered over the imagery; text SHALL never be 
        baked into images. Every image SHALL carry authored alt text. The 
        compressed payload SHALL NOT exceed 200 KB per image and 3.0 MB across 
        all era imagery, images SHALL lazy-load per era, and the base game's 
        initial payload SHALL be unchanged. Dialogue panels SHALL keep required 
        text contrast over any imagery, high-contrast mode SHALL use a solid 
        panel background, and reduced motion SHALL disable any backdrop motion 
        treatment.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/era-expeditions/spec.md
        title: era-expeditions
        revision: 
          sha256:ab7a834bb9ba87e06a79f6faaf3be4e84a3ff77146a5fea42590cf841bcfce0f
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-006-each-era-presents-an-authored-realistic-visual-identity:era-imagery-loads-offline-with-alt-text
        name: Era imagery loads offline with alt text
        given: the site is served statically with no network beyond the page 
          itself
        when: the player enters any era
        then: the backdrop, mentor portrait, and trial tableau render from local
          assets and each exposes its authored alt text
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-006-each-era-presents-an-authored-realistic-visual-identity:dialogue-stays-readable-over-imagery
        name: Dialogue stays readable over imagery
        given: a dialogue panel with multiple-choice options over the brightest 
          region of an era backdrop
        when: rendered in default and high-contrast modes
        then: the panel meets contrast requirements in both, using a solid 
          background in high contrast
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:era-expeditions:ee-006-each-era-presents-an-authored-realistic-visual-identity:payload-budget-holds
        name: Payload budget holds
        given: the complete set of committed era images
        when: compressed sizes are measured in the automated check
        then: no image exceeds 200 KB and the total does not exceed 3.0 MB, and 
          the base game's initial payload is unchanged
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:expedition-continuity:ec-001-save-schema-version-3-extends-the-chronicle-with-expedition-state
      title: EC-001 Save schema version 3 extends the chronicle with expedition 
        state
      summary: The save schema SHALL move to version 3, embedding an expedition 
        block (per-era status and best credit, mastery scores, revealed 
        inventions, codex completion) alongside the existing state and run. All 
        existing game-continuity guarantees (GC-001, GC-002) and the 
        dialogue/notes data introduced with version 2 SHALL continue to hold for
        version 3 saves.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/expedition-continuity/spec.md
        title: expedition-continuity
        revision: 
          sha256:c0f8d80712ce00e6b84c9d4a991d43a4693864da769cc08b476de908e6c4d512
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:expedition-continuity:ec-001-save-schema-version-3-extends-the-chronicle-with-expedition-state:mid-expedition-refresh
        name: Mid-expedition refresh
        given: a player who completed Babylon, is mid-exploration in Athens, and
          has one invention revealed
        when: the page is refreshed and Continue is chosen
        then: Babylon's completion, the revealed invention, current mastery, and
          the Athens in-progress exploration state are restored
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:expedition-continuity:ec-001-save-schema-version-3-extends-the-chronicle-with-expedition-state:mid-trial-refresh-resumes-safely
        name: Mid-trial refresh resumes safely
        given: a refresh occurs mid-way through a trial attempt
        when: the save is resumed
        then: the era resumes at the trial entry with clues intact and a 
          deterministic attempt state — either the identical seeded attempt or a
          cleanly restarted attempt, per the authored per-trial rule — and never
          a half-evaluated state
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:expedition-continuity:ec-002-older-saves-migrate-losslessly
      title: EC-002 Older saves migrate losslessly
      summary: A valid version 1 or version 2 save SHALL load under version 3 
        with all base-game state preserved exactly and a fresh initial 
        expedition attached; version 1 saves additionally receive the existing 
        v1→v2 dialogue/notes migration. Migration SHALL be pure, total for all 
        valid older saves, and covered by unit tests.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/expedition-continuity/spec.md
        title: expedition-continuity
        revision: 
          sha256:c0f8d80712ce00e6b84c9d4a991d43a4693864da769cc08b476de908e6c4d512
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:expedition-continuity:ec-002-older-saves-migrate-losslessly:v2-mid-game-save
        name: v2 mid-game save
        given: a valid v2 save from before victory
        when: it is loaded under the new schema
        then: play resumes exactly as v2 behavior dictated, with the expedition 
          initialized but unreachable until victory
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:expedition-continuity:ec-002-older-saves-migrate-losslessly:v1-save-migrates-through-the-chain
        name: v1 save migrates through the chain
        given: a valid v1 save
        when: it is loaded under the new schema
        then: dialogue and note data initialize per the existing v1→v2 migration
          and a fresh expedition is attached
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:expedition-continuity:ec-003-corrupted-expedition-data-degrades-without-losing-the-base-game
      title: EC-003 Corrupted expedition data degrades without losing the base 
        game
      summary: If the expedition block of an otherwise valid save is malformed, 
        the game SHALL restore the base-game state and attach a fresh expedition
        rather than discarding the whole save. A wholly invalid save SHALL keep 
        the existing GC-002 discard behavior.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/expedition-continuity/spec.md
        title: expedition-continuity
        revision: 
          sha256:c0f8d80712ce00e6b84c9d4a991d43a4693864da769cc08b476de908e6c4d512
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:expedition-continuity:ec-003-corrupted-expedition-data-degrades-without-losing-the-base-game:malformed-expedition-block-only
        name: Malformed expedition block only
        given: a v3 save with valid state and run but a truncated expedition 
          block
        when: the save is parsed
        then: the base game resumes normally and the expedition restarts empty, 
          with no exception thrown
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:finops-mastery-rank:fm-001-mastery-is-tracked-per-finops-domain
      title: FM-001 Mastery is tracked per FinOps domain
      summary: 'The game SHALL track mastery scores across the four FinOps Framework
        domains: Understand Usage & Cost, Quantify Business Value, Optimize Usage
        & Cost, and Manage the FinOps Practice. Every trial outcome and debrief answer
        SHALL be tagged to one or more domains, and each era SHALL contribute to at
        least one domain per the design mapping table.'
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/finops-mastery-rank/spec.md
        title: finops-mastery-rank
        revision: 
          sha256:a1029650b7b33ae17598c7ac0a61a1109ceed46c4c88b50b4e3fd0671e286201
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:finops-mastery-rank:fm-001-mastery-is-tracked-per-finops-domain:domain-attribution
        name: Domain attribution
        given: the player passes the Egypt trial and answers its debrief
        when: mastery is updated
        then: the Quantify Business Value domain gains the authored credit and 
          untagged domains are unchanged
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:finops-mastery-rank:fm-002-rank-derives-from-domain-mastery-using-the-maturity-model
      title: FM-002 Rank derives from domain mastery using the maturity model
      summary: The game SHALL derive one overall rank from the domain scores — 
        Garzone, Discepolo, Maestro dei Conti — explicitly presented as 
        mirroring the FinOps maturity stages Crawl, Walk, Run. Rank thresholds 
        SHALL be authored constants; rank SHALL be a pure function of the 
        mastery state; rank SHALL never decrease from retrying an era, because a
        later pass replaces (never stacks with) that era's reduced withdrawal 
        credit at whichever value is higher.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/finops-mastery-rank/spec.md
        title: finops-mastery-rank
        revision: 
          sha256:a1029650b7b33ae17598c7ac0a61a1109ceed46c4c88b50b4e3fd0671e286201
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:finops-mastery-rank:fm-002-rank-derives-from-domain-mastery-using-the-maturity-model:rank-promotion
        name: Rank promotion
        given: domain scores just below the Discepolo thresholds
        when: an era pass and strong debrief push the tagged domains past them
        then: the rank becomes Discepolo and the promotion is announced
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:finops-mastery-rank:fm-002-rank-derives-from-domain-mastery-using-the-maturity-model:retry-never-demotes
        name: Retry never demotes
        given: a completed era retried with worse debrief answers
        when: mastery is recomputed
        then: the stored era credit and the overall rank are no lower than 
          before
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:finops-mastery-rank:fm-003-the-ledger-of-mastery-presents-scores-honestly-and-locally
      title: FM-003 The Ledger of Mastery presents scores honestly and locally
      summary: The workshop hub SHALL contain a Ledger of Mastery showing 
        per-domain progress, the overall rank with its Crawl/Walk/Run 
        correspondence, per-era status, and which domains each completed era 
        exercised. All scores SHALL live only in the local save; no score SHALL 
        leave the browser. The surface SHALL state it reflects understanding of 
        concepts, not certification.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/finops-mastery-rank/spec.md
        title: finops-mastery-rank
        revision: 
          sha256:a1029650b7b33ae17598c7ac0a61a1109ceed46c4c88b50b4e3fd0671e286201
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:finops-mastery-rank:fm-003-the-ledger-of-mastery-presents-scores-honestly-and-locally:ledger-reflects-a-mixed-record
        name: Ledger reflects a mixed record
        given: three eras passed, one withdrawn, three unattempted
        when: the Ledger of Mastery is opened
        then: per-domain bars, the current rank, and each era's status are 
          shown, and refresh-plus-resume shows the identical ledger
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:finops-mastery-rank:fm-003-the-ledger-of-mastery-presents-scores-honestly-and-locally:scores-stay-local
        name: Scores stay local
        given: any expedition state
        when: network traffic is inspected during play including guidance 
          requests
        then: no mastery, rank, or per-era score data is transmitted
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:maestro-debrief:md-001-every-trial-outcome-leads-to-a-debrief-with-leonardo
      title: MD-001 Every trial outcome leads to a debrief with Leonardo
      summary: After every trial pass and every withdrawal the game SHALL route 
        the player into an authored debrief dialogue with Leonardo before 
        returning to the hub. The debrief SHALL open by naming, in plain 
        language, what the attempt demonstrated the player understood and what 
        it showed they missed, derived from the trial's recorded outcome and 
        failure category.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/maestro-debrief/spec.md
        title: maestro-debrief
        revision: 
          sha256:0c3b97c7a20ffee81fbb5c5c7fbbb2854fe5cc14d40833063158851a66d28671
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:maestro-debrief:md-001-every-trial-outcome-leads-to-a-debrief-with-leonardo:debrief-after-a-pass
        name: Debrief after a pass
        given: the player passes the Athens trial with an efficient allocation 
          but a wrong cost-per-trireme figure
        when: the debrief opens
        then: Leonardo credits the allocation reasoning and names unit cost as 
          the missed idea before questioning begins
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:maestro-debrief:md-001-every-trial-outcome-leads-to-a-debrief-with-leonardo:debrief-after-a-withdrawal
        name: Debrief after a withdrawal
        given: the player withdraws from any trial
        when: the debrief opens
        then: the missed concept is explained in era terms and the player is 
          told the era can be retried without penalty to base progress
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:maestro-debrief:md-002-debrief-questions-are-fixed-multiple-choice-with-authored-feedback-for-every-option
      title: MD-002 Debrief questions are fixed multiple-choice with authored 
        feedback for every option
      summary: Each era's debrief SHALL ask exactly three authored 
        multiple-choice questions that map the era's practice to its timeless 
        discipline (era-language framing, modern-language options among the 
        answers). Every option — correct and incorrect — SHALL carry authored 
        feedback explaining why it is right or wrong. Questions SHALL be 
        answerable from the era just played. No free-text input SHALL exist.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/maestro-debrief/spec.md
        title: maestro-debrief
        revision: 
          sha256:0c3b97c7a20ffee81fbb5c5c7fbbb2854fe5cc14d40833063158851a66d28671
      business_rules:
      - rule_id: 
