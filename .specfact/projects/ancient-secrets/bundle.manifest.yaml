      title: GB-002 The local backend is network-silent after opt-in download 
        completes
      summary: With the local backend active and its assets downloaded, guidance
        requests SHALL cause no network traffic of any kind; the only network 
        activity ever attributable to the local backend SHALL be the opt-in 
        asset download itself.
