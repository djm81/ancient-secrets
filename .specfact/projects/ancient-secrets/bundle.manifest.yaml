      title: GB-001 The player controls the guidance backend with authored-only 
        as default
      summary: The game SHALL offer an explicit backend preference — 
        authored-only (default), remote worker (when an endpoint is configured),
        local inference (when supported and opted in) — and SHALL never switch 
        backends without a player action.
