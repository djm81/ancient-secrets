      summary: Every `data-hs` interactable SHALL have a registry entry 
        categorized as puzzle, reusable clue, curiosity, transition, or 
        dialogue. The Window, Easel, Candle, Candelabra, and Florence Below 
        SHALL create persistent, reopenable Field Notes with an authored useful 
