          sha256:0c3b97c7a20ffee81fbb5c5c7fbbb2854fe5cc14d40833063158851a66d28671
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:maestro-debrief:md-003-the-closing-codex-dialogue-bridges-all-eras-to-the-modern-framework:closing-dialogue-content
        name: Closing dialogue content
        given: all seven folios are recovered
        when: the player starts the closing dialogue
        then: each era is linked to at least one named modern domain or 
          capability and the framework attribution is shown
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:maestro-debrief:md-004-debrief-answers-feed-mastery-deterministically
      title: MD-004 Debrief answers feed mastery deterministically
      summary: Each debrief answer SHALL contribute a defined, authored mastery 
        delta to the FinOps domains tagged on that question. Scoring SHALL be a 
        pure function of (trial outcome, answer choices) with no randomness, so 
        identical sessions yield identical Ledger of Mastery states.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/maestro-debrief/spec.md
        title: maestro-debrief
        revision: 
          sha256:0c3b97c7a20ffee81fbb5c5c7fbbb2854fe5cc14d40833063158851a66d28671
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:maestro-debrief:md-004-debrief-answers-feed-mastery-deterministically:reproducible-scoring
        name: Reproducible scoring
        given: two sessions with identical trial outcomes and identical debrief 
          answers across three eras
        when: mastery is computed
        then: both sessions produce identical per-domain scores and identical 
          rank
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:temporal-hub:th-001-the-workshop-hub-opens-only-after-the-base-game-is-solved
      title: TH-001 The workshop hub opens only after the base game is solved
      summary: The workshop hub SHALL become reachable when the base game's 
        victory state is reached, from both a live playthrough and a resumed 
        completed save. Before victory the hub, the Codex Rationum, and the 
        Occhio del Tempo SHALL NOT be reachable or discoverable through any 
        interaction, and the base game's ending SHALL be unchanged for players 
        who stop there.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/temporal-hub/spec.md
        title: temporal-hub
        revision: 
          sha256:52692ea94e7b489c62cadeb5dea7b824878956b8166afbbaba406cd84e7ad2b7
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:temporal-hub:th-001-the-workshop-hub-opens-only-after-the-base-game-is-solved:victory-unlocks-the-hub
        name: Victory unlocks the hub
        given: a player completes the base game's final puzzle
        when: the victory dialogue with the Maestro concludes
        then: the workshop hub scene is offered, and the pre-existing ending 
          remains intact if the player declines
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:temporal-hub:th-001-the-workshop-hub-opens-only-after-the-base-game-is-solved:a-completed-pre-expedition-save-enters-the-hub
        name: A completed pre-expedition save enters the hub
        given: a valid version 1 or version 2 save whose state is post-victory
        when: the save is resumed under the new schema
        then: the player can enter the workshop hub with a fresh, empty 
          expedition
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:temporal-hub:th-002-eras-are-chosen-through-fixed-choice-dialogue-with-leonardo
      title: TH-002 Eras are chosen through fixed-choice dialogue with Leonardo
      summary: The hub SHALL present era selection exclusively through authored 
        fixed-choice dialogue at the Occhio del Tempo. All seven eras SHALL be 
        selectable in any order from the start. Each era option SHALL show its 
        status (never attempted, withdrawn, complete) and Leonardo SHALL 
        recommend, but never enforce, chronological order. No free-text input 
        SHALL exist.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/temporal-hub/spec.md
        title: temporal-hub
        revision: 
          sha256:52692ea94e7b489c62cadeb5dea7b824878956b8166afbbaba406cd84e7ad2b7
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:temporal-hub:th-002-eras-are-chosen-through-fixed-choice-dialogue-with-leonardo:player-selects-an-era
        name: Player selects an era
        given: the player activates the Occhio del Tempo
        when: they choose Babylon from the era dialogue
        then: the Babylon era scene loads and the hub state records Babylon as 
          in progress
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:temporal-hub:th-002-eras-are-chosen-through-fixed-choice-dialogue-with-leonardo:era-statuses-are-visible
        name: Era statuses are visible
        given: the player has completed Babylon and withdrawn from Rome
        when: the era dialogue is opened
        then: Babylon is marked complete, Rome is marked withdrawn with a retry 
          option, and the remaining eras are marked unattempted
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:temporal-hub:th-003-completed-eras-permanently-reveal-inventions-in-the-workshop
      title: TH-003 Completed eras permanently reveal inventions in the workshop
      summary: Each era completion SHALL permanently uncover exactly one 
        authored Da Vinci invention in a fixed workshop alcove. Revealed 
        inventions SHALL be inspectable through fixed-choice dialogue containing
        an authored description, SHALL persist across sessions, and SHALL never 
        revert. With all seven revealed, the workshop SHALL present a completed 
        gallery state and unlock the closing Codex dialogue.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/temporal-hub/spec.md
        title: temporal-hub
        revision: 
          sha256:52692ea94e7b489c62cadeb5dea7b824878956b8166afbbaba406cd84e7ad2b7
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:temporal-hub:th-003-completed-eras-permanently-reveal-inventions-in-the-workshop:first-folio-reveals-an-invention
        name: First folio reveals an invention
        given: the player completes the Babylon trial and debrief
        when: they return to the workshop hub
        then: the anemometer alcove is uncovered with an announced, 
          reduced-motion-safe reveal, and it remains uncovered after refresh and
          resume
        priority:
      - rule_id: 
          openspec:temporal-finops-expedition:temporal-hub:th-003-completed-eras-permanently-reveal-inventions-in-the-workshop:codex-completion
        name: Codex completion
        given: all seven eras are complete
        when: the player returns to the hub
        then: the full gallery is present and the closing dialogue reading the 
          Codex forward becomes available
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:temporal-hub:th-004-the-hub-meets-the-established-experience-quality-standard
      title: TH-004 The hub meets the established experience-quality standard
      summary: Every hub interaction (era selection, alcove inspection, Ledger 
        of Mastery, closing dialogue) SHALL be fully keyboard-operable with 
        visible focus, SHALL honor reduced-motion and high-contrast settings, 
        and SHALL announce state changes through the existing feedback channel.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/temporal-hub/spec.md
        title: temporal-hub
        revision: 
          sha256:52692ea94e7b489c62cadeb5dea7b824878956b8166afbbaba406cd84e7ad2b7
      business_rules:
      - rule_id: 
          openspec:temporal-finops-expedition:temporal-hub:th-004-the-hub-meets-the-established-experience-quality-standard:keyboard-only-hub-traversal
        name: Keyboard-only hub traversal
        given: a keyboard-only player in the hub
        when: they traverse era selection, open an invention alcove, and open 
          the Ledger of Mastery
        then: every control is reachable and operable in a logical order with 
          visible focus, and each opened panel is announced
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:bounded-guidance:bg-001-guidance-is-fixed-action-and-cannot-mutate-game-state
      title: BG-001 Guidance is fixed-action and cannot mutate game state
      summary: The game SHALL expose exactly three guidance tiers—Nudge, 
        Stronger hint, and Reveal next step. It SHALL not accept player-entered 
        text. Requesting or receiving guidance SHALL NOT alter inventory, flags,
        route selection, score, or scene.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/proof-of-excellence-pass/specs/bounded-guidance/spec.md
        title: bounded-guidance
        revision: 
          sha256:d4732aa8bed134c2a3b20ae204dc7322109c56881928fb35d1709b961197fc7a
      business_rules:
      - rule_id: 
          openspec:proof-of-excellence-pass:bounded-guidance:bg-001-guidance-is-fixed-action-and-cannot-mutate-game-state:player-requests-a-guidance-tier
        name: Player requests a guidance tier
        given: a valid in-progress chronicle
        when: the player selects one of the three guidance tiers
        then: the game displays a hint for the current next action and the 
          gameplay state remains unchanged
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:bounded-guidance:bg-002-the-endpoint-accepts-only-a-whitelisted-state-summary
      title: BG-002 The endpoint accepts only a whitelisted state summary
      summary: '`POST /api/maestro-guide` SHALL accept a tier and a whitelisted state
        summary only. It SHALL reject malformed JSON, bodies over 4 KiB, unknown tiers,
        unrecognized item/scene values, and a client-supplied `nextActionId` that
        does not match the Worker-calculated action.'
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/proof-of-excellence-pass/specs/bounded-guidance/spec.md
        title: bounded-guidance
        revision: 
          sha256:d4732aa8bed134c2a3b20ae204dc7322109c56881928fb35d1709b961197fc7a
      business_rules:
      - rule_id: 
          openspec:proof-of-excellence-pass:bounded-guidance:bg-002-the-endpoint-accepts-only-a-whitelisted-state-summary:a-client-attempts-to-select-a-spoiler-action
        name: A client attempts to select a spoiler action
        given: a starting-state summary
        when: the request names `open-trapdoor` as its next action
        then: the endpoint returns HTTP 400 and does not invoke the model 
          provider
        priority:
      - rule_id: 
          openspec:proof-of-excellence-pass:bounded-guidance:bg-002-the-endpoint-accepts-only-a-whitelisted-state-summary:a-client-sends-an-oversized-request
        name: A client sends an oversized request
        given: a request body larger than 4 KiB
        when: it is posted to the endpoint
        then: the endpoint returns HTTP 413 and does not invoke the model 
          provider
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:bounded-guidance:bg-003-ai-output-is-bounded-and-safely-replaceable
      title: BG-003 AI output is bounded and safely replaceable
      summary: The endpoint SHALL return only `{ tier, message, nextActionId }`.
        It SHALL enforce the requested tier, the calculated action ID, and a 
        45-word message limit. The client SHALL use an authored response of the 
        same shape if the endpoint is unavailable, returns an error, or returns 
        an invalid response.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/proof-of-excellence-pass/specs/bounded-guidance/spec.md
        title: bounded-guidance
        revision: 
          sha256:d4732aa8bed134c2a3b20ae204dc7322109c56881928fb35d1709b961197fc7a
      business_rules:
      - rule_id: 
          openspec:proof-of-excellence-pass:bounded-guidance:bg-003-ai-output-is-bounded-and-safely-replaceable:the-guide-endpoint-is-unavailable
        name: The guide endpoint is unavailable
        given: a player asks for a hint
        when: the request times out, fails, or returns invalid JSON
        then: the player receives an authored hint and can complete the game 
          normally
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:bounded-guidance:bg-004-secrets-and-player-data-stay-outside-the-client
      title: BG-004 Secrets and player data stay outside the client
      summary: The model provider key SHALL exist only in Worker secret 
        configuration. The browser SHALL send no player-entered text, account 
        data, identifier, or save history to the endpoint.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/proof-of-excellence-pass/specs/bounded-guidance/spec.md
        title: bounded-guidance
        revision: 
          sha256:d4732aa8bed134c2a3b20ae204dc7322109c56881928fb35d1709b961197fc7a
      business_rules:
      - rule_id: 
          openspec:proof-of-excellence-pass:bounded-guidance:bg-004-secrets-and-player-data-stay-outside-the-client:public-source-is-inspected
        name: Public source is inspected
        given: a reviewer searches browser JavaScript and HTML
        when: they inspect guide integration
        then: no provider secret is present and the request payload contains 
          only the documented state summary
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:bounded-guidance:bg-005-public-guidance-requests-are-rate-limited
      title: BG-005 Public guidance requests are rate limited
      summary: The production Worker deployment SHALL apply a platform-backed 
        server-side rate limit to `POST /api/maestro-guide` before calling the 
        model provider. An AI-enabled deployment missing its allowed-origin or 
        rate-limit configuration SHALL fail closed. A limited request SHALL 
        return HTTP 429 and the client SHALL display authored guidance without 
        altering game state.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/proof-of-excellence-pass/specs/bounded-guidance/spec.md
        title: bounded-guidance
        revision: 
          sha256:d4732aa8bed134c2a3b20ae204dc7322109c56881928fb35d1709b961197fc7a
      business_rules:
      - rule_id: 
          openspec:proof-of-excellence-pass:bounded-guidance:bg-005-public-guidance-requests-are-rate-limited:the-endpoint-rate-limit-is-reached
        name: The endpoint rate limit is reached
        given: the deployment's rate-limit threshold has been reached
        when: the player requests a guidance tier
        then: the endpoint returns HTTP 429 and the client presents its authored
          fallback
        priority:
      - rule_id: 
          openspec:proof-of-excellence-pass:bounded-guidance:bg-005-public-guidance-requests-are-rate-limited:an-ai-enabled-worker-is-missing-its-safety-binding
        name: An AI-enabled Worker is missing its safety binding
        given: a Worker has a provider key but lacks its configured allowed 
          origin or rate-limit binding
        when: a valid guidance request is posted
        then: the endpoint returns a non-success response without invoking the 
          model provider
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:experience-quality:eq-001-core-play-is-keyboard-accessible
      title: EQ-001 Core play is keyboard accessible
      summary: Every hotspot, navigation arrow, inventory slot, modal action, 
        music control, guidance control, and contrast control SHALL expose a 
        meaningful accessible name, visible focus indication, and Enter/Space 
        activation where it is not a native button.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/proof-of-excellence-pass/specs/experience-quality/spec.md
        title: experience-quality
        revision: 
          sha256:dcf398549e56d91b1e33e20b01f892be1c63853129c40c073c37f3ec54814a5e
      business_rules:
      - rule_id: 
          openspec:proof-of-excellence-pass:experience-quality:eq-001-core-play-is-keyboard-accessible:keyboard-only-opening-sequence
        name: Keyboard-only opening sequence
        given: a player uses only Tab, Shift+Tab, Enter, and Space
        when: they begin a chronicle
        then: they can take the mirror, select it, read the note, and close the 
          note modal without a pointer
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:experience-quality:eq-002-feedback-respects-user-preferences
      title: EQ-002 Feedback respects user preferences
      summary: The game SHALL honour `prefers-reduced-motion`, offer a 
        persistent high-contrast preference for the current browser, and 
        announce dialogue/puzzle feedback through a polite live region.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/proof-of-excellence-pass/specs/experience-quality/spec.md
        title: experience-quality
        revision: 
          sha256:dcf398549e56d91b1e33e20b01f892be1c63853129c40c073c37f3ec54814a5e
      business_rules:
      - rule_id: 
          openspec:proof-of-excellence-pass:experience-quality:eq-002-feedback-respects-user-preferences:reduced-motion-player-receives-a-puzzle-update
        name: Reduced-motion player receives a puzzle update
        given: reduced motion is enabled by the operating system
        when: a puzzle state changes
        then: the result is understandable through text and no essential 
          animated transition is required
        priority:
      - rule_id: 
          openspec:proof-of-excellence-pass:experience-quality:eq-002-feedback-respects-user-preferences:player-enables-high-contrast
        name: Player enables high contrast
        given: the player enables high contrast
        when: the page is refreshed
        then: the high-contrast preference is restored and controls remain 
          distinguishable without colour alone
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:game-continuity:gc-001-a-valid-chronicle-resumes-after-refresh
      title: GC-001 A valid chronicle resumes after refresh
      summary: The game SHALL save a versioned chronicle after state-changing 
        player actions. A valid save SHALL restore route, code, bell pattern, 
        inventory, flags, curiosities, selected scene, and visual world state. 
        The title screen SHALL show Continue only when a valid save exists.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/proof-of-excellence-pass/specs/game-continuity/spec.md
        title: game-continuity
        revision: 
          sha256:5c6c673ff32e51b6c60570250fb93fa49ddb4fc743779e3713f01977f365810d
      business_rules:
      - rule_id: 
          openspec:proof-of-excellence-pass:game-continuity:gc-001-a-valid-chronicle-resumes-after-refresh:player-refreshes-mid-chronicle
        name: Player refreshes mid-chronicle
        given: the player has acquired the mirror and brass key
        when: the page is refreshed and Continue is chosen
        then: both items, the matching flags, and the correct chronicle route 
          are restored
        priority:
      - rule_id: 
          openspec:proof-of-excellence-pass:game-continuity:gc-001-a-valid-chronicle-resumes-after-refresh:player-refreshes-during-a-reward-transition
        name: Player refreshes during a reward transition
        given: a player has triggered a machine repair or a bread-for-gear 
          puzzle
        when: the page is refreshed before non-essential animation or dialogue 
          completes
        then: Continue restores a playable state with the trapdoor or gear 
          reward already available
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:game-continuity:gc-002-corrupted-saves-fail-safely
      title: GC-002 Corrupted saves fail safely
      summary: The game SHALL discard malformed, incompatible, or invalid saved 
        data without throwing. It SHALL offer a new chronicle and SHALL NOT 
        reuse partial state.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/proof-of-excellence-pass/specs/game-continuity/spec.md
        title: game-continuity
        revision: 
          sha256:5c6c673ff32e51b6c60570250fb93fa49ddb4fc743779e3713f01977f365810d
      business_rules:
      - rule_id: 
          openspec:proof-of-excellence-pass:game-continuity:gc-002-corrupted-saves-fail-safely:browser-storage-contains-malformed-data
        name: Browser storage contains malformed data
        given: the save value is not valid JSON or does not meet the current 
          schema
        when: the title screen loads
        then: Continue is hidden and starting a new chronicle succeeds
        priority:
      - rule_id: 
          openspec:proof-of-excellence-pass:game-continuity:gc-002-corrupted-saves-fail-safely:browser-storage-is-unavailable
        name: Browser storage is unavailable
        given: the browser denies access to local storage
        when: the game loads or a player changes game state
        then: core play continues without throwing, while resume and persisted 
          contrast are unavailable for that session
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:portfolio-experience:pe-001-a-reviewer-can-understand-the-project-before-playing
      title: PE-001 A reviewer can understand the project before playing
      summary: The root page SHALL present a concise portfolio landing page 
        instead of redirecting immediately. It SHALL include a direct game CTA 
        labelled “Play (6–8 min)”, a feature summary, and engineering notes 
        covering architecture, AI safety, accessibility, testing, and 
        intentional limits.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/proof-of-excellence-pass/specs/portfolio-experience/spec.md
        title: portfolio-experience
        revision: 
          sha256:450d4cfc0b6a73666ac9ad8f9347484c1aa1226bf647d8948ef14b98334e5078
      business_rules:
      - rule_id: 
          openspec:proof-of-excellence-pass:portfolio-experience:pe-001-a-reviewer-can-understand-the-project-before-playing:reviewer-opens-the-published-root-url
        name: Reviewer opens the published root URL
        given: a visitor opens the GitHub Pages root URL
        when: the page finishes loading
        then: the visitor can find the labelled play CTA and engineering notes 
          without entering the game
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:proof-of-excellence-pass:portfolio-experience:pe-002-the-game-communicates-the-current-objective
      title: PE-002 The game communicates the current objective
      summary: The game SHALL display the current chapter and one actionable 
