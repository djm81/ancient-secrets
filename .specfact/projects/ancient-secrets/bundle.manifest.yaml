    - schema_version: '1'
      requirement_id: 
        openspec:on-device-guidance:local-inference-runtime:li-003-local-replies-pass-the-unchanged-shared-validation-boundary
      title: LI-003 Local replies pass the unchanged shared validation boundary
      summary: Every locally generated reply SHALL pass the same 
        `validateGuidance` checks as remote replies (requested tier preserved, 
        `nextActionId` equal to the game's own computation, 45-word cap) plus 
        the hallucination and spoiler validators, and any rejection SHALL serve 
        the authored hint for the requested tier.
      sources:
