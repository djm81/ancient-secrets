          sha256:65b38582b3fb1c3a263600ca4d84a6f83c3deeac8f5c80e480174c90aa2a8480
      business_rules:
      - rule_id: 
          openspec:local-npc-conversation:conversation-safety:sf-001-a-deterministic-lexical-filter-guards-both-directions-with-authored-deflections:filtered-output-deflects
        name: Filtered output deflects
        given: a persona reply containing a filtered term
        when: the reply is processed
        then: the authored deflection is displayed and the raw reply is never 
          rendered
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:local-npc-conversation:conversation-safety:sf-002-conversation-content-is-excluded-from-every-egress-and-persistence-surface
      title: SF-002 Conversation content is excluded from every egress and 
        persistence surface
      summary: Conversation content (player text and persona replies) SHALL be 
        excluded from `summarizeForGuidance`, all guidance requests, the save 
        schema, browser storage, and any diagnostic output, in every backend 
        configuration.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/local-npc-conversation/specs/conversation-safety/spec.md
        title: conversation-safety
        revision: 
          sha256:65b38582b3fb1c3a263600ca4d84a6f83c3deeac8f5c80e480174c90aa2a8480
      business_rules:
      - rule_id: 
          openspec:local-npc-conversation:conversation-safety:sf-002-conversation-content-is-excluded-from-every-egress-and-persistence-surface:guidance-summary-stays-clean-during-conversation
        name: Guidance summary stays clean during conversation
        given: an active conversation and a guidance request issued from the 
          same session
        when: the guidance payload is inspected
        then: it contains only the allowlisted summary fields and no 
          conversation content
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:local-npc-conversation:conversation-safety:sf-003-the-conversation-surface-registers-a-red-team-corpus-with-the-evaluation-harness
      title: SF-003 The conversation surface registers a red-team corpus with 
        the evaluation harness
      summary: This surface SHALL register with the adversarial evaluation 
        harness (per AE-005) a corpus covering direct jailbreaks, role-play 
        escalation, filter-evasion encodings, and malformed classifier outputs, 
        replayed in default CI without a model.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/local-npc-conversation/specs/conversation-safety/spec.md
        title: conversation-safety
        revision: 
          sha256:65b38582b3fb1c3a263600ca4d84a6f83c3deeac8f5c80e480174c90aa2a8480
      business_rules:
      - rule_id: 
          openspec:local-npc-conversation:conversation-safety:sf-003-the-conversation-surface-registers-a-red-team-corpus-with-the-evaluation-harness:corpus-present-and-gating
        name: Corpus present and gating
        given: the harness's surface registry
        when: the replay suite runs
        then: the conversation surface has non-empty corpus coverage for each 
          listed attack family and violations fail the suite
        priority:
      constraints: []
      evidence_links: []
