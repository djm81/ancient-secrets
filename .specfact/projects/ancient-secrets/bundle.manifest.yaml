      requirement_id: 
        openspec:on-device-guidance:local-inference-runtime:li-005-adversarial-containment-for-the-local-backend
      title: LI-005 Adversarial containment for the local backend
      summary: Hostile strings placed in any allowlisted summary field SHALL NOT
        change the requested tier, the computed `nextActionId`, or game state 
        when processed by the local backend, and this SHALL be exercised by 
        corpus entries registered with the adversarial evaluation harness (per 
        AE-005) replaying spoofed local replies without a live engine in CI.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/on-device-guidance/specs/local-inference-runtime/spec.md
        title: local-inference-runtime
