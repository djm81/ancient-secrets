      title: LM-003 Live evaluations are advisory to the static-site pipeline
      summary: The live-model workflow SHALL NOT be a required check for 
        building or deploying the static site; a provider outage or evaluation 
        failure SHALL never block GitHub Pages deployment of the authored game.
