    - schema_version: '1'
      requirement_id: 
        openspec:temporal-finops-expedition:maestro-debrief:md-003-the-closing-codex-dialogue-bridges-all-eras-to-the-modern-framework
      title: MD-003 The closing Codex dialogue bridges all eras to the modern 
        framework
      summary: When all seven eras are complete, an authored closing dialogue 
        SHALL walk the reconstructed Codex forward from Babylon to the present, 
        explicitly naming the modern discipline's phases (Inform, Optimize, 
        Operate) and four domains, crediting the FinOps Foundation framework, 
        and stating that the game teaches concepts rather than granting 
        certification.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/temporal-finops-expedition/specs/maestro-debrief/spec.md
        title: maestro-debrief
