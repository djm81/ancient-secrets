    - schema_version: '1'
      requirement_id: 
        openspec:expedition-debrief-judge:free-response-debrief:fr-002-judge-outcomes-never-block-progression-nor-demote-mastery-below-the-multiple-choice-floor
      title: FR-002 Judge outcomes never block progression nor demote mastery 
        below the multiple-choice floor
      summary: No judge verdict, failure, or unavailability SHALL prevent a 
        debrief from completing, and a free-form answer's mastery delta SHALL 
        never be lower than the delta of the equivalent multiple-choice outcome.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/expedition-debrief-judge/specs/free-response-debrief/spec.md
        title: free-response-debrief
        revision: 
          sha256:d74ac584e0c6678d179c1b3d7877ab5531f240749e6a2c36ec2a43a13404dae0
      business_rules:
      - rule_id: 
          openspec:expedition-debrief-judge:free-response-debrief:fr-002-judge-outcomes-never-block-progression-nor-demote-mastery-below-the-multiple-choice-floor:all-false-verdict-equals-a-wrong-multiple-choice-answer
        name: All-false verdict equals a wrong multiple-choice answer
        given: a free-form answer the judge marks false on every criterion
        when: the debrief question resolves
        then: progression continues identically to a wrong multiple-choice 
          answer and the recorded delta equals that outcome's authored delta
        priority:
      - rule_id: 
          openspec:expedition-debrief-judge:free-response-debrief:fr-002-judge-outcomes-never-block-progression-nor-demote-mastery-below-the-multiple-choice-floor:judge-outage-mid-debrief
        name: Judge outage mid-debrief
        given: the judge route becomes unavailable after the player submits an 
          answer
        when: the timeout elapses
        then: the question silently presents its multiple-choice options and the
          debrief completes normally
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
    - schema_version: '1'
      requirement_id: 
        openspec:expedition-debrief-judge:free-response-debrief:fr-003-free-form-answering-requires-explicit-informed-consent-that-is-revocable
      title: FR-003 Free-form answering requires explicit informed consent that 
        is revocable
      summary: Before any answer text leaves the device, the player SHALL see a 
        disclosure naming exactly what is sent, the destination, and that 
        nothing is stored; consent SHALL be per-session, never pre-checked, and 
        revocable, with revocation hiding the free-form path without penalty.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/expedition-debrief-judge/specs/free-response-debrief/spec.md
        title: free-response-debrief
        revision: 
          sha256:d74ac584e0c6678d179c1b3d7877ab5531f240749e6a2c36ec2a43a13404dae0
      business_rules:
      - rule_id: 
          openspec:expedition-debrief-judge:free-response-debrief:fr-003-free-form-answering-requires-explicit-informed-consent-that-is-revocable:no-consent-no-egress
        name: No consent, no egress
        given: a player who has not confirmed the disclosure
        when: any debrief question is displayed and answered
        then: no request containing answer text is issued
        priority:
      - rule_id: 
          openspec:expedition-debrief-judge:free-response-debrief:fr-003-free-form-answering-requires-explicit-informed-consent-that-is-revocable:revocation-reverts-to-multiple-choice
        name: Revocation reverts to multiple-choice
        given: a player who consented earlier in the session
        when: they revoke consent from the same surface
        then: the free-form option no longer renders and subsequent questions 
          proceed via multiple-choice
        priority:
      constraints: []
      evidence_links: []
      completeness_findings: []
