    - schema_version: '1'
      requirement_id: 
        openspec:local-npc-conversation:conversation-safety:sf-001-a-deterministic-lexical-filter-guards-both-directions-with-authored-deflections
      title: SF-001 A deterministic lexical filter guards both directions with 
        authored deflections
      summary: A versioned, in-repo lexical filter SHALL screen player text 
        before classification and persona output before display; any hit SHALL 
        replace the interaction's visible result with the character's authored 
        deflection line. The filter SHALL be deterministic and unit-tested.
      sources:
      - source_type: openspec_change
        locator: 
          openspec/changes/local-npc-conversation/specs/conversation-safety/spec.md
        title: conversation-safety
