  - rule_id: openspec:proof-of-excellence-pass:portfolio-experience:pe-001-a-reviewer-can-understand-the-project-before-playing:reviewer-opens-the-published-root-url
    name: Reviewer opens the published root URL
    given: a visitor opens the GitHub Pages root URL
    when: the page finishes loading
    then: the visitor can find the labelled play CTA and engineering notes without
      entering the game
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:portfolio-experience:pe-002-the-game-communicates-the-current-objective
  title: PE-002 The game communicates the current objective
  summary: The game SHALL display the current chapter and one actionable objective
    derived from state. It SHALL provide a visible entry to guidance without requiring
    a puzzle failure or long wait.
  sources:
  - source_type: openspec_change
    locator: openspec/changes/proof-of-excellence-pass/specs/portfolio-experience/spec.md
    title: portfolio-experience
    revision: sha256:450d4cfc0b6a73666ac9ad8f9347484c1aa1226bf647d8948ef14b98334e5078
  business_rules:
  - rule_id: openspec:proof-of-excellence-pass:portfolio-experience:pe-002-the-game-communicates-the-current-objective:a-new-chronicle-begins
    name: A new chronicle begins
    given: the player has started a new chronicle
    when: the workshop is shown
    then: the progress strip identifies the first chapter and an objective appropriate
      to the starting state
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:temporal-finops-expedition:era-expeditions:ee-006-each-era-presents-an-authored-realistic-visual-identity
  title: EE-006 Each era presents an authored, realistic visual identity
  summary: "Each era SHALL ship three authored realistic images unique to its civilization\
    \ \u2014 scene backdrop, mentor portrait, and trial tableau \u2014 generated at\
    \ authoring time from recorded art briefs, curated for historical accuracy, and\
    \ committed as optimized static assets. All era interaction SHALL use the established\
    \ dialogue-panel pattern with fixed multiple-choice options rendered over the\
    \ imagery; text SHALL never be baked into images. Every image SHALL carry authored\
    \ alt text. The compressed payload SHALL NOT exceed 200 KB per image and 3.0 MB\
    \ across all era imagery, images SHALL lazy-load per era, and the base game's\
    \ initial payload SHALL be unchanged. Dialogue panels SHALL keep required text\
    \ contrast over any imagery, high-contrast mode SHALL use a solid panel background,\
    \ and reduced motion SHALL disable any backdrop motion treatment."
  sources:
  - source_type: openspec_change
    locator: openspec/changes/temporal-finops-expedition/specs/era-expeditions/spec.md
    title: era-expeditions
    revision: sha256:ab7a834bb9ba87e06a79f6faaf3be4e84a3ff77146a5fea42590cf841bcfce0f
  business_rules:
  - rule_id: openspec:temporal-finops-expedition:era-expeditions:ee-006-each-era-presents-an-authored-realistic-visual-identity:era-imagery-loads-offline-with-alt-text
    name: Era imagery loads offline with alt text
    given: the site is served statically with no network beyond the page itself
    when: the player enters any era
    then: the backdrop, mentor portrait, and trial tableau render from local assets
      and each exposes its authored alt text
    priority: null
  - rule_id: openspec:temporal-finops-expedition:era-expeditions:ee-006-each-era-presents-an-authored-realistic-visual-identity:dialogue-stays-readable-over-imagery
    name: Dialogue stays readable over imagery
    given: a dialogue panel with multiple-choice options over the brightest region
      of an era backdrop
    when: rendered in default and high-contrast modes
    then: the panel meets contrast requirements in both, using a solid background
      in high contrast
    priority: null
  - rule_id: openspec:temporal-finops-expedition:era-expeditions:ee-006-each-era-presents-an-authored-realistic-visual-identity:payload-budget-holds
    name: Payload budget holds
    given: the complete set of committed era images
    when: compressed sizes are measured in the automated check
    then: no image exceeds 200 KB and the total does not exceed 3.0 MB, and the base
      game's initial payload is unchanged
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
