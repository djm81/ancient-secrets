  title: TH-002 Eras are chosen through fixed-choice dialogue with Leonardo
  summary: The hub SHALL present era selection exclusively through authored fixed-choice
    dialogue at the Occhio del Tempo. All seven eras SHALL be selectable in any order
    from the start. Each era option SHALL show its status (never attempted, withdrawn,
    complete) and Leonardo SHALL recommend, but never enforce, chronological order.
    No free-text input SHALL exist.
