- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-001-guidance-is-fixed-action-and-cannot-mutate-game-state
  title: BG-001 Guidance is fixed-action and cannot mutate game state
  summary: "The game SHALL expose exactly three guidance tiers\u2014Nudge, Stronger\
    \ hint, and Reveal next step. It SHALL not accept player-entered text. Requesting\
    \ or receiving guidance SHALL NOT alter inventory, flags, route selection, score,\
    \ or scene."
  sources:
  - source_type: openspec_change
    locator: openspec/changes/proof-of-excellence-pass/specs/bounded-guidance/spec.md
    title: bounded-guidance
    revision: sha256:d4732aa8bed134c2a3b20ae204dc7322109c56881928fb35d1709b961197fc7a
  business_rules:
  - rule_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-001-guidance-is-fixed-action-and-cannot-mutate-game-state:player-requests-a-guidance-tier
    name: Player requests a guidance tier
    given: a valid in-progress chronicle
    when: the player selects one of the three guidance tiers
    then: the game displays a hint for the current next action and the gameplay state
      remains unchanged
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-002-the-endpoint-accepts-only-a-whitelisted-state-summary
  title: BG-002 The endpoint accepts only a whitelisted state summary
  summary: '`POST /api/maestro-guide` SHALL accept a tier and a whitelisted state
    summary only. It SHALL reject malformed JSON, bodies over 4 KiB, unknown tiers,
    unrecognized item/scene values, and a client-supplied `nextActionId` that does
    not match the Worker-calculated action.'
  sources:
  - source_type: openspec_change
    locator: openspec/changes/proof-of-excellence-pass/specs/bounded-guidance/spec.md
    title: bounded-guidance
    revision: sha256:d4732aa8bed134c2a3b20ae204dc7322109c56881928fb35d1709b961197fc7a
  business_rules:
  - rule_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-002-the-endpoint-accepts-only-a-whitelisted-state-summary:a-client-attempts-to-select-a-spoiler-action
    name: A client attempts to select a spoiler action
    given: a starting-state summary
    when: the request names `open-trapdoor` as its next action
    then: the endpoint returns HTTP 400 and does not invoke the model provider
    priority: null
  - rule_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-002-the-endpoint-accepts-only-a-whitelisted-state-summary:a-client-sends-an-oversized-request
    name: A client sends an oversized request
    given: a request body larger than 4 KiB
    when: it is posted to the endpoint
    then: the endpoint returns HTTP 413 and does not invoke the model provider
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-003-ai-output-is-bounded-and-safely-replaceable
  title: BG-003 AI output is bounded and safely replaceable
  summary: The endpoint SHALL return only `{ tier, message, nextActionId }`. It SHALL
    enforce the requested tier, the calculated action ID, and a 45-word message limit.
    The client SHALL use an authored response of the same shape if the endpoint is
    unavailable, returns an error, or returns an invalid response.
  sources:
  - source_type: openspec_change
    locator: openspec/changes/proof-of-excellence-pass/specs/bounded-guidance/spec.md
    title: bounded-guidance
    revision: sha256:d4732aa8bed134c2a3b20ae204dc7322109c56881928fb35d1709b961197fc7a
  business_rules:
  - rule_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-003-ai-output-is-bounded-and-safely-replaceable:the-guide-endpoint-is-unavailable
    name: The guide endpoint is unavailable
    given: a player asks for a hint
    when: the request times out, fails, or returns invalid JSON
    then: the player receives an authored hint and can complete the game normally
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-004-secrets-and-player-data-stay-outside-the-client
  title: BG-004 Secrets and player data stay outside the client
  summary: The model provider key SHALL exist only in Worker secret configuration.
    The browser SHALL send no player-entered text, account data, identifier, or save
    history to the endpoint.
  sources:
  - source_type: openspec_change
    locator: openspec/changes/proof-of-excellence-pass/specs/bounded-guidance/spec.md
    title: bounded-guidance
    revision: sha256:d4732aa8bed134c2a3b20ae204dc7322109c56881928fb35d1709b961197fc7a
  business_rules:
  - rule_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-004-secrets-and-player-data-stay-outside-the-client:public-source-is-inspected
    name: Public source is inspected
    given: a reviewer searches browser JavaScript and HTML
    when: they inspect guide integration
    then: no provider secret is present and the request payload contains only the
      documented state summary
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-005-public-guidance-requests-are-rate-limited
  title: BG-005 Public guidance requests are rate limited
  summary: The production Worker deployment SHALL apply a platform-backed server-side
    rate limit to `POST /api/maestro-guide` before calling the model provider. An
    AI-enabled deployment missing its allowed-origin or rate-limit configuration SHALL
    fail closed. A limited request SHALL return HTTP 429 and the client SHALL display
    authored guidance without altering game state.
  sources:
  - source_type: openspec_change
    locator: openspec/changes/proof-of-excellence-pass/specs/bounded-guidance/spec.md
    title: bounded-guidance
    revision: sha256:d4732aa8bed134c2a3b20ae204dc7322109c56881928fb35d1709b961197fc7a
  business_rules:
  - rule_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-005-public-guidance-requests-are-rate-limited:the-endpoint-rate-limit-is-reached
    name: The endpoint rate limit is reached
    given: the deployment's rate-limit threshold has been reached
    when: the player requests a guidance tier
    then: the endpoint returns HTTP 429 and the client presents its authored fallback
    priority: null
  - rule_id: openspec:proof-of-excellence-pass:bounded-guidance:bg-005-public-guidance-requests-are-rate-limited:an-ai-enabled-worker-is-missing-its-safety-binding
    name: An AI-enabled Worker is missing its safety binding
    given: a Worker has a provider key but lacks its configured allowed origin or
      rate-limit binding
    when: a valid guidance request is posted
    then: the endpoint returns a non-success response without invoking the model provider
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:experience-quality:eq-001-core-play-is-keyboard-accessible
  title: EQ-001 Core play is keyboard accessible
  summary: Every hotspot, navigation arrow, inventory slot, modal action, music control,
    guidance control, and contrast control SHALL expose a meaningful accessible name,
    visible focus indication, and Enter/Space activation where it is not a native
    button.
