  - rule_id: openspec:temporal-finops-expedition:temporal-hub:th-004-the-hub-meets-the-established-experience-quality-standard:keyboard-only-hub-traversal
    name: Keyboard-only hub traversal
    given: a keyboard-only player in the hub
    when: they traverse era selection, open an invention alcove, and open the Ledger
      of Mastery
    then: every control is reachable and operable in a logical order with visible
      focus, and each opened panel is announced
    priority: null
