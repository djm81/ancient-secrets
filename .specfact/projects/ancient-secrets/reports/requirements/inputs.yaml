  requirement_id: openspec:temporal-finops-expedition:temporal-hub:th-003-completed-eras-permanently-reveal-inventions-in-the-workshop
  title: TH-003 Completed eras permanently reveal inventions in the workshop
  summary: Each era completion SHALL permanently uncover exactly one authored Da Vinci
    invention in a fixed workshop alcove. Revealed inventions SHALL be inspectable
    through fixed-choice dialogue containing an authored description, SHALL persist
    across sessions, and SHALL never revert. With all seven revealed, the workshop
    SHALL present a completed gallery state and unlock the closing Codex dialogue.
  sources:
  - source_type: openspec_change
    locator: openspec/changes/temporal-finops-expedition/specs/temporal-hub/spec.md
