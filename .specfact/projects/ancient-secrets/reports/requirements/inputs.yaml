  business_rules:
  - rule_id: openspec:temporal-finops-expedition:temporal-hub:th-003-completed-eras-permanently-reveal-inventions-in-the-workshop:first-folio-reveals-an-invention
    name: First folio reveals an invention
    given: the player completes the Babylon trial and debrief
    when: they return to the workshop hub
    then: the anemometer alcove is uncovered with an announced, reduced-motion-safe
      reveal, and it remains uncovered after refresh and resume
    priority: null
  - rule_id: openspec:temporal-finops-expedition:temporal-hub:th-003-completed-eras-permanently-reveal-inventions-in-the-workshop:codex-completion
    name: Codex completion
    given: all seven eras are complete
    when: the player returns to the hub
    then: the full gallery is present and the closing dialogue reading the Codex forward
      becomes available
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:temporal-finops-expedition:temporal-hub:th-004-the-hub-meets-the-established-experience-quality-standard
  title: TH-004 The hub meets the established experience-quality standard
  summary: Every hub interaction (era selection, alcove inspection, Ledger of Mastery,
    closing dialogue) SHALL be fully keyboard-operable with visible focus, SHALL honor
    reduced-motion and high-contrast settings, and SHALL announce state changes through
    the existing feedback channel.
