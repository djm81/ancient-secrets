  business_rules:
  - rule_id: openspec:temporal-finops-expedition:temporal-hub:th-002-eras-are-chosen-through-fixed-choice-dialogue-with-leonardo:player-selects-an-era
    name: Player selects an era
    given: the player activates the Occhio del Tempo
    when: they choose Babylon from the era dialogue
    then: the Babylon era scene loads and the hub state records Babylon as in progress
    priority: null
  - rule_id: openspec:temporal-finops-expedition:temporal-hub:th-002-eras-are-chosen-through-fixed-choice-dialogue-with-leonardo:era-statuses-are-visible
    name: Era statuses are visible
    given: the player has completed Babylon and withdrawn from Rome
    when: the era dialogue is opened
    then: Babylon is marked complete, Rome is marked withdrawn with a retry option,
