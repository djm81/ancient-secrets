  business_rules:
  - rule_id: openspec:proof-of-excellence-pass:experience-quality:eq-001-core-play-is-keyboard-accessible:keyboard-only-opening-sequence
    name: Keyboard-only opening sequence
    given: a player uses only Tab, Shift+Tab, Enter, and Space
    when: they begin a chronicle
    then: they can take the mirror, select it, read the note, and close the note modal
      without a pointer
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:experience-quality:eq-002-feedback-respects-user-preferences
  title: EQ-002 Feedback respects user preferences
  summary: The game SHALL honour `prefers-reduced-motion`, offer a persistent high-contrast
    preference for the current browser, and announce dialogue/puzzle feedback through
    a polite live region.
  sources:
  - source_type: openspec_change
    locator: openspec/changes/proof-of-excellence-pass/specs/experience-quality/spec.md
    title: experience-quality
    revision: sha256:dcf398549e56d91b1e33e20b01f892be1c63853129c40c073c37f3ec54814a5e
  business_rules:
  - rule_id: openspec:proof-of-excellence-pass:experience-quality:eq-002-feedback-respects-user-preferences:reduced-motion-player-receives-a-puzzle-update
    name: Reduced-motion player receives a puzzle update
    given: reduced motion is enabled by the operating system
    when: a puzzle state changes
    then: the result is understandable through text and no essential animated transition
      is required
    priority: null
  - rule_id: openspec:proof-of-excellence-pass:experience-quality:eq-002-feedback-respects-user-preferences:player-enables-high-contrast
    name: Player enables high contrast
    given: the player enables high contrast
    when: the page is refreshed
    then: the high-contrast preference is restored and controls remain distinguishable
      without colour alone
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:game-continuity:gc-001-a-valid-chronicle-resumes-after-refresh
  title: GC-001 A valid chronicle resumes after refresh
  summary: The game SHALL save a versioned chronicle after state-changing player actions.
    A valid save SHALL restore route, code, bell pattern, inventory, flags, curiosities,
    selected scene, and visual world state. The title screen SHALL show Continue only
    when a valid save exists.
  sources:
  - source_type: openspec_change
    locator: openspec/changes/proof-of-excellence-pass/specs/game-continuity/spec.md
    title: game-continuity
    revision: sha256:5c6c673ff32e51b6c60570250fb93fa49ddb4fc743779e3713f01977f365810d
  business_rules:
  - rule_id: openspec:proof-of-excellence-pass:game-continuity:gc-001-a-valid-chronicle-resumes-after-refresh:player-refreshes-mid-chronicle
    name: Player refreshes mid-chronicle
    given: the player has acquired the mirror and brass key
    when: the page is refreshed and Continue is chosen
    then: both items, the matching flags, and the correct chronicle route are restored
    priority: null
  - rule_id: openspec:proof-of-excellence-pass:game-continuity:gc-001-a-valid-chronicle-resumes-after-refresh:player-refreshes-during-a-reward-transition
    name: Player refreshes during a reward transition
    given: a player has triggered a machine repair or a bread-for-gear puzzle
    when: the page is refreshed before non-essential animation or dialogue completes
    then: Continue restores a playable state with the trapdoor or gear reward already
      available
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:game-continuity:gc-002-corrupted-saves-fail-safely
  title: GC-002 Corrupted saves fail safely
  summary: The game SHALL discard malformed, incompatible, or invalid saved data without
    throwing. It SHALL offer a new chronicle and SHALL NOT reuse partial state.
  sources:
  - source_type: openspec_change
    locator: openspec/changes/proof-of-excellence-pass/specs/game-continuity/spec.md
    title: game-continuity
    revision: sha256:5c6c673ff32e51b6c60570250fb93fa49ddb4fc743779e3713f01977f365810d
  business_rules:
  - rule_id: openspec:proof-of-excellence-pass:game-continuity:gc-002-corrupted-saves-fail-safely:browser-storage-contains-malformed-data
    name: Browser storage contains malformed data
    given: the save value is not valid JSON or does not meet the current schema
    when: the title screen loads
    then: Continue is hidden and starting a new chronicle succeeds
    priority: null
  - rule_id: openspec:proof-of-excellence-pass:game-continuity:gc-002-corrupted-saves-fail-safely:browser-storage-is-unavailable
    name: Browser storage is unavailable
    given: the browser denies access to local storage
    when: the game loads or a player changes game state
    then: core play continues without throwing, while resume and persisted contrast
      are unavailable for that session
    priority: null
  constraints: []
  evidence_links: []
  completeness_findings: []
- schema_version: '1'
  requirement_id: openspec:proof-of-excellence-pass:portfolio-experience:pe-001-a-reviewer-can-understand-the-project-before-playing
  title: PE-001 A reviewer can understand the project before playing
  summary: "The root page SHALL present a concise portfolio landing page instead of\
    \ redirecting immediately. It SHALL include a direct game CTA labelled \u201C\
    Play (6\u20138 min)\u201D, a feature summary, and engineering notes covering architecture,\
    \ AI safety, accessibility, testing, and intentional limits."
  sources:
  - source_type: openspec_change
    locator: openspec/changes/proof-of-excellence-pass/specs/portfolio-experience/spec.md
    title: portfolio-experience
    revision: sha256:450d4cfc0b6a73666ac9ad8f9347484c1aa1226bf647d8948ef14b98334e5078
