    priority: null
  - rule_id: openspec:temporal-finops-expedition:temporal-hub:th-001-the-workshop-hub-opens-only-after-the-base-game-is-solved:a-completed-v1-save-enters-the-hub
    name: A completed v1 save enters the hub
    given: a version 1 save whose state is post-victory
    when: the save is resumed under the new schema
    then: the player can enter the workshop hub with a fresh, empty expedition
    priority: null
